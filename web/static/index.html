<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>CryptoVote · Secure Blind Signature Voting</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Animated network background -->
    <canvas id="network-canvas"></canvas>

    <div id="app-shell">
      <!-- Sidebar -->
      <aside id="sidebar">
        <div class="sidebar-brand">
          <div class="brand-icon">
            <svg
              width="20"
              height="20"
              fill="none"
              stroke="#000"
              viewBox="0 0 24 24"
              stroke-width="2.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
              />
            </svg>
          </div>
          <div>
            <div class="brand-name">CryptoVote</div>
            <div class="brand-sub">Secure voting Protocol</div>
          </div>
        </div>

        <nav class="sidebar-nav" id="sidebar-nav"></nav>

        <div class="sidebar-keys" id="sidebar-keys">
          <div class="sidebar-keys-title">
            <svg
              width="12"
              height="12"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"
              />
            </svg>
            Active Keys
          </div>
          <div
            id="keys-display"
            style="color: var(--text-muted); font-size: 0.65rem"
          >
            No keys generated
          </div>
        </div>
      </aside>

      <!-- Top bar -->
      <div id="top-bar">
        <div style="display: flex; align-items: center">
          <span class="status-dot" id="state-dot"></span>
          <span class="status-label" id="state-label">SYSTEM: IDLE</span>
        </div>
        <div class="topbar-right">
          <span class="topbar-count"
            ><span id="tb-cast">0</span> / <span id="tb-total">0</span> TOTAL
            BALLOTS</span
          >
        </div>
      </div>

      <!-- Main -->
      <main id="main-content">
        <div id="page-content" class="page-inner"></div>
      </main>
    </div>

    <!-- JavaScript Modules -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/pages/home.js"></script>
    <script src="js/pages/admin.js"></script>
    <script src="js/pages/vote.js"></script>
    <script src="js/pages/results.js"></script>
    <script src="js/pages/audit.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
